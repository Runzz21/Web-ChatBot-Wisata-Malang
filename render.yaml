services:
  - type: web
    name: wisatamalang
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan optimize
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_CONFIG_CACHE
        value: /opt/render/project/src/bootstrap/cache/config.php
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: wisatamalang-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wisatamalang-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: wisatamalang-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: wisatamalang-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wisatamalang-db
          property: password
      - key: LOG_LEVEL
        value: warning
    autoDeploy: true

databases:
  - name: wisatamalang-db
    plan: free
    database: wisatamalang
    user: wisatamalang
